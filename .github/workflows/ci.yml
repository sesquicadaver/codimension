# CI: ruff, mypy у venv. Відповідно до doc/plugins/plugins-implementation-plan.md
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .
          pip install ruff mypy

      - name: Ruff check (cdmplugins)
        run: |
          . .venv/bin/activate
          ruff check cdmplugins

      - name: Ruff format (check only, cdmplugins)
        run: |
          . .venv/bin/activate
          ruff format --check cdmplugins

      - name: Mypy (cdmplugins)
        run: |
          . .venv/bin/activate
          mypy $(find cdmplugins -name '*.py')

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and smoke test
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .
          codimension --help
