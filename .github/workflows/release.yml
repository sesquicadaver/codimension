# Release: build та upload на PyPI при push тегу v*
# Потрібен GitHub Secret: PYPI_API_TOKEN (pypi-xxx)
# Перед релізом: оновити ChangeLog, codimension/cdmverspec.py, потім git tag -a vX.Y.Z -m "Release X.Y.Z"
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag vs cdmverspec
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SPEC=$(grep -E '^version\s*=' codimension/cdmverspec.py | cut -d'"' -f2)
          if [ "$TAG" != "$SPEC" ]; then
            echo "Tag v$TAG does not match codimension/cdmverspec.py version $SPEC"
            exit 1
          fi
          echo "Version $SPEC OK"

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
